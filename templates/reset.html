<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family:"Times New Roman";
}

/* TITLE */
.main-title {
    color:white;
    font-size:30px;
    font-weight:bold;
    margin-bottom:20px;
}

/* BOX */
.box {
    background:white;
    padding:35px;
    border-radius:12px;
    width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* HEADING */
h2 {
    text-align:center;
    margin-bottom:25px;
}

/* INPUT */
.input-box {
    position: relative;
    margin-bottom: 20px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.input-box span {
    position: absolute;
    right: 10px;
    top: 12px;
    cursor: pointer;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    background: linear-gradient(90deg,#667eea,#764ba2);
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

/* STRENGTH BAR */
.strength {
    width: 100%;
    height: 6px;
    background: #ddd;
    border-radius: 5px;
    margin-bottom: 20px;
}

#strengthBar {
    height: 100%;
    width: 0%;
    border-radius: 5px;
}

/* POPUP */
.popup {
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

.popup button {
    margin-top:15px;
    padding:10px 20px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="main-title">
Academic Task Prioritization & Deadline Management System
</div>

<div class="box">
<div class="auth-box">
    <h2>Set New Password</h2>

    <form method="POST">

        <!-- NEW PASSWORD -->
        <div class="input-box">
            <input type="password" id="newPass" name="password" placeholder="New Password" required>
            <span onclick="togglePass('newPass')">👁️</span>
        </div>

        <!-- STRENGTH -->
        <div class="strength">
            <div id="strengthBar"></div>
        </div>

        <!-- CONFIRM -->
        <div class="input-box">
            <input type="password" id="confirmPass" name="confirm" placeholder="Confirm Password" required>
            <span onclick="togglePass('confirmPass')">👁️</span>
        </div>

        <button type="submit">Reset Password</button>
    </form>
</div>
</div>

<!-- ✅ SUCCESS POPUP -->
<div id="successPopup" class="popup">
    <h3 style="color:black;">✔ Password Changed Successfully</h3>
    <button onclick="goLogin()">Done</button>
</div>

<script>

/* TOGGLE */
function togglePass(id) {
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

/* RUN AFTER PAGE LOAD */
document.addEventListener("DOMContentLoaded", function () {

    /* STRENGTH */
    let newPass = document.getElementById("newPass");

    if (newPass) {
        newPass.addEventListener("input", function () {
            let val = this.value;
            let bar = document.getElementById("strengthBar");

            if (val.length < 4) {
                bar.style.width = "30%";
                bar.style.background = "red";
            } else if (val.length < 8) {
                bar.style.width = "60%";
                bar.style.background = "orange";
            } else {
                bar.style.width = "100%";
                bar.style.background = "green";
            }
        });
    }

    /* SUCCESS CHECK */
    let success = "{{ success }}";

    if (success === "True") {
        showSuccess();

        setTimeout(function () {
            window.location.href = "/";
        }, 2000);
    }

});

/* POPUP */
function showSuccess() {
    document.getElementById("successPopup").style.display = "block";
}

function goLogin() {
    window.location.href = "/";
}

</script>
</body>
</html>
