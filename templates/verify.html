<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: Arial;
}

.auth-box {
    width: 420px;
    padding: 35px;
    background: white;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.auth-box h2 {
    margin-bottom: 25px;
    font-family:"Times New Roman";
}

.auth-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.auth-box button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    color: white;
    font-weight: bold;
    margin-bottom: 15px;
    cursor: pointer;
}

#resendBtn {
    display: block;
    margin-bottom: 10px;
    color: blue;
    text-decoration: none;
    cursor: pointer;
}

.timer {
    font-size: 13px;
    color: gray;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 350px;
    padding: 30px;
    border-radius: 15px;
    background: white;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

.popup button {
    padding: 10px 30px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="auth-box">
    <h2>Verify OTP</h2>

    <form method="POST">
        <input type="text" name="otp" placeholder="Enter OTP" required>

        <button type="submit">Verify</button>

        <!-- RESEND -->
        <a id="resendBtn">Resend OTP</a>
        <p class="timer">Resend OTP in <span id="timer">60</span>s</p>
    </form>
</div>

<!-- SINGLE POPUP -->
<div id="otpPopup" class="popup">
    <p id="popupMsg"></p>
    <button onclick="closePopup()">OK</button>
</div>

<script>

/* ===== RUN AFTER PAGE LOAD ===== */
document.addEventListener("DOMContentLoaded", function () {

    /* ===== TIMER + DISABLE ===== */
    let time = 60;
    let btn = document.getElementById("resendBtn");

    if (btn) {
        btn.style.pointerEvents = "none";
        btn.style.opacity = "0.5";
    }

    let interval = setInterval(function () {
        time--;
        document.getElementById("timer").innerText = time;

        if (time <= 0) {
            clearInterval(interval);
            btn.style.pointerEvents = "auto";
            btn.style.opacity = "1";
        }
    }, 1000);

    /* ===== BACKEND TRIGGER (SAFE) ===== */
    let error = "{{ error }}";

    if (error === "invalid") {
        showPopup("Invalid OTP ❌");
    } 
    else if (error === "expired") {
        showPopup("OTP Expired ⏰");
    }

});

/* ===== POPUP ===== */
function showPopup(msg) {
    document.getElementById("popupMsg").innerText = msg;
    document.getElementById("otpPopup").style.display = "block";
}

function closePopup() {
    document.getElementById("otpPopup").style.display = "none";
}

</script>

</body>
</html>
