<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<style>
body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: Arial;
}
.box {
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    text-align:center;
}
input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}
button {
    margin-top:15px;
    width:100%;
    padding:10px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>
<div class="box">
    <h2>Reset Password</h2>

    {% if msg %}
        <p style="color:green;">{{ msg }}</p>
    {% endif %}

    <form method="POST">
    <input type="email" name="email" placeholder="Enter your email" required>
    <button type="submit">Send OTP</button>
</form>

    <p><a href="/">Back to Login</a></p>
</div>
</body>
</html>
